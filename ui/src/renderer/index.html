<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src http://127.0.0.1:8741 ws://localhost:5173; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:"
    />
    <title>Second Brain</title>
  </head>
  <body>
    <div id="app">
      <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <span class="logo-icon">⬡</span>
            <span class="logo-text">Second Brain</span>
          </div>
          <button id="btn-new" class="icon-btn" title="New document (Ctrl+N)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path
                d="M8 2a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 8 2Z"
              />
            </svg>
          </button>
        </div>

        <div class="sidebar-section">
          <label class="section-label">Context</label>
          <select id="context-select" class="select">
            <option value="">All contexts</option>
          </select>
        </div>

        <div class="sidebar-section sidebar-section--grow">
          <label class="section-label">Recent</label>
          <ul id="recent-list" class="thought-list">
            <li class="list-placeholder">Loading…</li>
          </ul>
        </div>

        <div class="sidebar-section">
          <label class="section-label">
            Review Queue
            <span id="review-badge" class="badge" hidden>0</span>
          </label>
          <ul id="review-list" class="thought-list"></ul>
        </div>

        <div class="sidebar-footer">
          <button id="btn-open" class="text-btn">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
              <path
                d="M1.75 1A1.75 1.75 0 0 0 0 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0 0 16 13.25v-8.5A1.75 1.75 0 0 0 14.25 3H7.5a.25.25 0 0 1-.2-.1l-.9-1.2C6.07 1.26 5.55 1 5 1H1.75Z"
              />
            </svg>
            Open File…
          </button>
        </div>
      </aside>

      <!-- ── Editor area ─────────────────────────────────────────────────── -->
      <main id="editor-area">
        <div id="toolbar">
          <div class="toolbar-group">
            <button class="tb-btn" data-cmd="strong" title="Bold (Ctrl+B)">
              <b>B</b>
            </button>
            <button class="tb-btn" data-cmd="em" title="Italic (Ctrl+I)">
              <i>I</i>
            </button>
            <button class="tb-btn" data-cmd="strike" title="Strikethrough">
              <s>S</s>
            </button>
            <button class="tb-btn" data-cmd="code_inline" title="Inline code">
              <code>`</code>
            </button>
          </div>
          <div class="toolbar-sep"></div>
          <div class="toolbar-group">
            <button class="tb-btn" data-cmd="h1" title="Heading 1">H1</button>
            <button class="tb-btn" data-cmd="h2" title="Heading 2">H2</button>
            <button class="tb-btn" data-cmd="h3" title="Heading 3">H3</button>
          </div>
          <div class="toolbar-sep"></div>
          <div class="toolbar-group">
            <button class="tb-btn" data-cmd="bullet_list" title="Bullet list">
              <svg
                width="14"
                height="14"
                viewBox="0 0 16 16"
                fill="currentColor"
              >
                <circle cx="2" cy="4" r="1.5" />
                <rect x="5" y="3" width="10" height="2" rx="1" />
                <circle cx="2" cy="8" r="1.5" />
                <rect x="5" y="7" width="10" height="2" rx="1" />
                <circle cx="2" cy="12" r="1.5" />
                <rect x="5" y="11" width="10" height="2" rx="1" />
              </svg>
            </button>
            <button class="tb-btn" data-cmd="ordered_list" title="Ordered list">
              1.
            </button>
            <button class="tb-btn" data-cmd="blockquote" title="Blockquote">
              "
            </button>
            <button class="tb-btn" data-cmd="code_block" title="Code block">
              {}
            </button>
          </div>
          <div class="toolbar-flex"></div>
          <div class="toolbar-group">
            <button
              id="btn-save-file"
              class="action-btn"
              title="Save file (Ctrl+S)"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 16 16"
                fill="currentColor"
              >
                <path
                  d="M2.75 1h7.5c.966 0 1.75.784 1.75 1.75V4h.75a.75.75 0 0 1 .53.22l2 2a.75.75 0 0 1 .22.53v8.5A1.75 1.75 0 0 1 13.25 17H2.75A1.75 1.75 0 0 1 1 15.25V2.75C1 1.784 1.784 1 2.75 1Zm.5 1.5a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25V7.06L12.44 5.5H12v1.75A1.75 1.75 0 0 1 10.25 9h-4.5A1.75 1.75 0 0 1 4 7.25V5.5H3.25ZM10.5 5.5v-2h-5v2a.25.25 0 0 0 .25.25h4.5a.25.25 0 0 0 .25-.25ZM8 13a2 2 0 1 1 0-4 2 2 0 0 1 0 4Z"
                />
              </svg>
              Save
            </button>
            <button
              id="btn-save-brain"
              class="primary-btn"
              title="Save to Brain (Ctrl+Shift+S)"
            >
              → Save to Brain
            </button>
          </div>
        </div>

        <div id="editor-wrap">
          <div id="editor"></div>
        </div>

        <div id="status-bar">
          <span id="status-file">Untitled</span>
          <span id="status-words">0 words</span>
          <span id="status-msg" class="status-msg"></span>
          <span id="status-server" class="status-server" title="Server status"
            >●</span
          >
        </div>
      </main>

      <!-- ── Brain panel ─────────────────────────────────────────────────── -->
      <aside id="brain-panel">
        <div class="panel-tabs" role="tablist">
          <button class="tab-btn active" data-tab="search" role="tab">
            Search
          </button>
          <button class="tab-btn" data-tab="patterns" role="tab">
            Patterns
          </button>
          <button class="tab-btn" data-tab="review" role="tab">Review</button>
          <button class="tab-btn" data-tab="digest" role="tab">Digest</button>
        </div>

        <!-- Search -->
        <div id="tab-search" class="tab-content active">
          <div class="panel-search-row">
            <input
              id="search-input"
              type="search"
              placeholder="Search your brain…"
              autocomplete="off"
              spellcheck="false"
            />
            <button id="btn-search" class="icon-btn" title="Search">
              <svg
                width="15"
                height="15"
                viewBox="0 0 16 16"
                fill="currentColor"
              >
                <path
                  d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"
                />
              </svg>
            </button>
          </div>
          <ul id="search-results" class="result-list"></ul>
        </div>

        <!-- Patterns -->
        <div id="tab-patterns" class="tab-content">
          <button id="btn-patterns" class="block-btn">Detect Patterns</button>
          <div id="patterns-output" class="panel-body"></div>
        </div>

        <!-- Review -->
        <div id="tab-review" class="tab-content">
          <button id="btn-review-load" class="block-btn">
            Load Review Queue
          </button>
          <ul id="panel-review-list" class="result-list"></ul>
        </div>

        <!-- Digest -->
        <div id="tab-digest" class="tab-content">
          <button id="btn-digest" class="block-btn">
            Generate Weekly Digest
          </button>
          <div id="digest-output" class="panel-body"></div>
        </div>
      </aside>
    </div>

    <!-- ── Capture modal ───────────────────────────────────────────────────── -->
    <div id="capture-modal" class="modal-backdrop" hidden>
      <div
        class="modal-box"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <div class="modal-header">
          <h2 id="modal-title">Save to Brain</h2>
          <button id="btn-modal-close" class="icon-btn" aria-label="Close">
            ✕
          </button>
        </div>
        <p class="modal-hint">
          The current document will be saved as a thought in your brain.
        </p>

        <div class="form-grid">
          <label class="form-label">
            Context
            <select id="capture-context" class="select">
              <option value="">None</option>
            </select>
          </label>
          <label class="form-label">
            Project <span class="optional">(optional)</span>
            <input
              type="text"
              id="capture-project"
              class="input"
              placeholder="e.g. second-brian"
            />
          </label>
          <label class="form-label" style="grid-column: 1 / -1">
            Topics <span class="optional">(comma-separated)</span>
            <input
              type="text"
              id="capture-topics"
              class="input"
              placeholder="e.g. architecture, ux"
            />
          </label>
          <label class="form-label">
            Source type
            <select id="capture-source" class="select">
              <option value="firsthand">Firsthand</option>
              <option value="secondhand">Secondhand</option>
              <option value="read">Read</option>
              <option value="assumed">Assumed</option>
            </select>
          </label>
        </div>

        <div class="modal-actions">
          <button id="btn-cancel-capture" class="text-btn">Cancel</button>
          <button id="btn-confirm-capture" class="primary-btn">Save</button>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
